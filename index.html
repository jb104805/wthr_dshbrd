// ══════════════════════════════════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════════════════════════════════
function localToday() {
  const d = new Date();
  return d.toLocaleDateString('en-CA');  // YYYY-MM-DD
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toLocaleDateString('en-CA');
}
function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function fmtDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short' });
}
function getMonth(dateStr) { return parseInt(dateStr.slice(5,7)) - 1; }

function getDateRange() {
  const today = localToday();
  const dates = [];
  for (let i = -7; i <= 10; i++) dates.push(addDays(today, i));
  return { today, dates };
}

function devColor(dev) {
  if (dev <= -15) return { bg:'#1a5276', fg:'#ffffff' };
  if (dev <= -10) return { bg:'#2980b9', fg:'#ffffff' };
  if (dev <=  -5) return { bg:'#aed6f1', fg:'#0f1923' };
  if (dev <=  -3) return { bg:'#d6eaf8', fg:'#0f1923' };
  if (dev <    3) return { bg:'#3d5166', fg:'#e8f0f7' };
  if (dev <    5) return { bg:'#fadbd8', fg:'#0f1923' };
  if (dev <    8) return { bg:'#f1948a', fg:'#0f1923' };
  if (dev <   15) return { bg:'#e74c3c', fg:'#ffffff' };
                  return { bg:'#922b21', fg:'#ffffff' };
}

// ══════════════════════════════════════════════════════════════
// API FETCH
// ══════════════════════════════════════════════════════════════
async function fetchWeather(city) {
  const today = localToday();
  const past  = addDays(today, -7);
  const key   = `${city.name}_${city.state}`;
  const result = {};

  // Archive API — past 7 days (actual observations)
  try {
    const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${city.lat}&longitude=${city.lon}&start_date=${past}&end_date=${today}&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.daily) {
      d.daily.time.forEach((dt, i) => {
        if (d.daily.temperature_2m_max[i] != null)
          result[dt] = [Math.round(d.daily.temperature_2m_max[i]), Math.round(d.daily.temperature_2m_min[i])];
      });
    }
  } catch(e) { console.warn('Archive error', city.name, e); }

  // Forecast API — today + 10 days
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto&forecast_days=11`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.daily) {
      d.daily.time.forEach((dt, i) => {
        if (d.daily.temperature_2m_max[i] != null)
          result[dt] = [Math.round(d.daily.temperature_2m_max[i]), Math.round(d.daily.temperature_2m_min[i])];
      });
    }
  } catch(e) { console.warn('Forecast error', city.name, e); }

  return { key, data: result };
}

async function fetch10yrNormals(city) {
  const key = `${city.name}_${city.state}`;
  const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${city.lat}&longitude=${city.lon}&start_date=2015-01-01&end_date=2024-12-31&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    const mh = Array.from({length:12}, ()=>[]);
    const ml = Array.from({length:12}, ()=>[]);
    d.daily.time.forEach((dt, i) => {
      const m = parseInt(dt.slice(5,7)) - 1;
      if (d.daily.temperature_2m_max[i] != null) {
        mh[m].push(d.daily.temperature_2m_max[i]);
        ml[m].push(d.daily.temperature_2m_min[i]);
      }
    });
    return { key, data: mh.map((h,m) => [
      h.length ? Math.round(h.reduce((a,b)=>a+b)/h.length) : null,
      ml[m].length ? Math.round(ml[m].reduce((a,b)=>a+b)/ml[m].length) : null
    ])};
  } catch(e) {
    console.warn('10yr error', city.name, e);
    return { key, data: null };
  }
}

  btn.disabled = true;
  spinner.classList.add('active');

  // Check localStorage for 10-yr normals cache
  const cached10 = localStorage.getItem('normals10yr');
  const cacheAge = localStorage.getItem('normals10yr_date');
  const today    = localToday();

  let need10yr = !cached10 || cacheAge !== today.slice(0,7); // refresh monthly

  if (cached10 && !need10yr) {
    normals10 = JSON.parse(cached10);
    msg.textContent = 'Fetching weather data…';
  } else {
    msg.textContent = 'First load: fetching 10-yr historical normals (one-time, ~1 min)…';
  }

  // Fetch weather for all cities in parallel
  msg.textContent = 'Fetching weather data…';
  const weatherResults = await Promise.all(CITIES.map(c => fetchWeather(c)));
  weatherData = {};
  weatherResults.forEach(({key, data}) => { weatherData[key] = data; });

  // Fetch 10-yr normals if needed (rate-limit friendly: sequential with delay)
  if (need10yr) {
    msg.textContent = 'Fetching 10-yr historical normals… (first run only, please wait)';
    const norm10results = [];
    for (const city of CITIES) {
      const result = await fetch10yrNormals(city);
      norm10results.push(result);
      await new Promise(r => setTimeout(r, 2000)); // 2s delay to avoid 429
    }
    normals10 = {};
    norm10results.forEach(({key, data}) => { if (data) normals10[key] = data; });
    localStorage.setItem('normals10yr', JSON.stringify(normals10));
    localStorage.setItem('normals10yr_date', today.slice(0,7));
  }

  lastRefresh = new Date();
  btn.disabled  = false;
  spinner.classList.remove('active');
  msg.textContent = `Refreshed: ${lastRefresh.toLocaleString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit'})}`;

  renderTable();
}

// ══════════════════════════════════════════════════════════════
// RENDER TABLE
// ══════════════════════════════════════════════════════════════
function renderTable() {
  const { today, dates } = getDateRange();
  const table = document.getElementById('mainTable');
  table.innerHTML = '';

  const todayIdx = dates.indexOf(today);

  // ── Period label row ──
  const pRow = table.insertRow();
  pRow.className = 'period-row';
  let td = pRow.insertCell(); td.colSpan = 1; // city col
  td = pRow.insertCell(); td.className = 'lbl-past'; td.colSpan = 7; td.textContent = '◄  ACTUAL (Past 7 Days)';
  td = pRow.insertCell(); td.className = 'lbl-future'; td.style.color = '#e87820'; td.textContent = 'TODAY';
  td = pRow.insertCell(); td.className = 'lbl-future'; td.colSpan = 10; td.textContent = 'FORECAST (Next 10 Days)  ►';
  td = pRow.insertCell(); // divider
  td = pRow.insertCell(); td.className = 'lbl-norm'; td.textContent = '30-yr';
  td = pRow.insertCell(); td.className = 'lbl-norm'; td.textContent = '10-yr';

  // ── Date header row ──
  const dateRow = document.createElement('tr');
  dateRow.className = 'date-row';
  let th = document.createElement('th');
  th.className = 'city-hdr'; th.textContent = 'City';
  dateRow.appendChild(th);

  dates.forEach((dt, i) => {
    th = document.createElement('th');
    th.textContent = fmtDate(dt);
    th.className = dt === today ? 'today-hdr' : (dt < today ? 'past-hdr' : 'future-hdr');
    if (dt === today) th.style.borderLeft = th.style.borderRight = '2px solid #e87820';
    dateRow.appendChild(th);
  });

  // divider
  th = document.createElement('th'); th.className = 'divider-col'; dateRow.appendChild(th);
  th = document.createElement('th'); th.className = 'norm-hdr'; th.textContent = '30-yr Norm'; dateRow.appendChild(th);
  th = document.createElement('th'); th.className = 'norm-hdr'; th.textContent = '10-yr Norm'; dateRow.appendChild(th);
  table.appendChild(dateRow);

  // ── Day-of-week header row ──
  const dayRow = document.createElement('tr');
  dayRow.className = 'day-row';
  th = document.createElement('th'); th.className = 'city-hdr'; dayRow.appendChild(th);
  dates.forEach(dt => {
    th = document.createElement('th');
    th.textContent = fmtDay(dt);
    th.className = dt === today ? 'today-hdr' : (dt < today ? 'past-hdr' : 'future-hdr');
    th.style.fontSize = '10px';
    if (dt === today) th.style.borderLeft = th.style.borderRight = '2px solid #e87820';
    dayRow.appendChild(th);
  });
  th = document.createElement('th'); th.className = 'divider-col'; dayRow.appendChild(th);
  th = document.createElement('th'); th.className = 'norm-hdr'; dayRow.appendChild(th);
  th = document.createElement('th'); th.className = 'norm-hdr'; dayRow.appendChild(th);
  table.appendChild(dayRow);

  // ── City rows ──
  CITIES.forEach((city, ci) => {
    const key   = `${city.name}_${city.state}`;
    const cData = weatherData[key] || {};
    const n30   = NOAA[key]       || Array(12).fill([null,null]);
    const n10   = normals10[key]  || null;

    const row = table.insertRow();

    // City name cell
    const cityTd = row.insertCell();
    cityTd.className = 'city-cell';
    cityTd.innerHTML = `${city.name}, ${city.state} <span class="market">${city.market}</span>`;

    // Temperature cells
    dates.forEach(dt => {
      const cell   = row.insertCell();
      const temps  = cData[dt];
      const mIdx   = getMonth(dt);
      const isToday = dt === today;

      if (!temps) {
        cell.className = 'temp-cell empty' + (isToday ? ' today-cell' : '');
        cell.textContent = '—';
        return;
      }

      const [hi, lo] = temps;
      const norms = baseline === '10yr' ? n10 : n30;
      const normH = norms ? norms[mIdx][0] : null;
      const dev   = normH != null ? hi - normH : null;

      cell.className = 'temp-cell' + (isToday ? ' today-cell' : '');
      cell.textContent = `${hi}/${lo}`;

      if (dev != null) {
        const { bg, fg } = devColor(dev);
        cell.style.background = bg;
        cell.style.color      = fg;
      } else {
        cell.style.background = '#243344';
        cell.style.color      = '#e8f0f7';
      }

      if (isToday) {
        cell.style.fontWeight = '700';
        cell.style.borderLeft  = '2px solid #e87820';
        cell.style.borderRight = '2px solid #e87820';
      }

      // Tooltip
      const n30h = n30[mIdx][0], n30l = n30[mIdx][1];
      const n10h = n10 ? n10[mIdx][0] : null;
      const dev30 = n30h != null ? hi - n30h : null;
      const dev10 = n10h != null ? hi - n10h : null;
      cell.addEventListener('mouseenter', (e) => showTooltip(e, city, dt, hi, lo, n30h, n30l, n10h, dev30, dev10));
      cell.addEventListener('mousemove',  moveTooltip);
      cell.addEventListener('mouseleave', hideTooltip);
    });

    // Divider
    const divCell = row.insertCell();
    divCell.className = 'divider-col';

    // 30-yr norm
    const m = getMonth(today);
    const norm30cell = row.insertCell();
    norm30cell.className = 'norm-cell';
    norm30cell.textContent = n30[m][0] != null ? `${n30[m][0]}/${n30[m][1]}` : '—';

    // 10-yr norm
    const norm10cell = row.insertCell();
    norm10cell.className = 'norm-cell';
    norm10cell.textContent = n10 && n10[m][0] != null ? `${n10[m][0]}/${n10[m][1]}` : (lastRefresh ? '—' : '…');
    if (!n10) norm10cell.style.color = '#4a7a6a';
  });

  // ── Price placeholder row ──
  const pr = table.insertRow();
  pr.className = 'price-row';
  const ph = pr.insertCell();
  ph.textContent = 'CAISO Day-Ahead LMP ($/MWh) — Phase 2';
  for (let i = 0; i < dates.length + 3; i++) {
    const c = pr.insertCell();
    c.textContent = '—';
  }
}

// ══════════════════════════════════════════════════════════════
// TOOLTIP
// ══════════════════════════════════════════════════════════════
function showTooltip(e, city, dt, hi, lo, n30h, n30l, n10h, dev30, dev10) {
  const tip = document.getElementById('tooltip');
  const sign = v => v > 0 ? `+${v}` : `${v}`;
  tip.innerHTML = `
    <strong>${city.name}, ${city.state}</strong> &nbsp;·&nbsp; ${fmtDay(dt)} ${fmtDate(dt)}<br>
    Temp: <strong>${hi}°F high / ${lo}°F low</strong><br>
    30-yr Normal: ${n30h != null ? `${n30h}/${n30l}  (dev: <strong>${sign(dev30)}°F</strong>)` : '—'}<br>
    10-yr Normal: ${n10h != null ? `${n10h}  (dev: <strong>${sign(dev10)}°F</strong>)` : 'loading…'}
  `;
  tip.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  const tip = document.getElementById('tooltip');
  const x = e.clientX + 14, y = e.clientY + 14;
  tip.style.left = Math.min(x, window.innerWidth - 260) + 'px';
  tip.style.top  = Math.min(y, window.innerHeight - 100) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
loadData();
</script>
